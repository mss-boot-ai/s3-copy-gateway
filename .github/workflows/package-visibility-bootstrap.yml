name: Bootstrap public GHCR package

on:
  workflow_dispatch:

permissions: {}

jobs:
  package:
    name: Make package public
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: write
    steps:
      - name: Publish package visibility
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ghcr.io/mss-boot-ai/s3-copy-gateway
        shell: bash
        run: |
          set -euo pipefail
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            /orgs/mss-boot-ai/packages/container/s3-copy-gateway \
            -f visibility=public

          token="$(
            curl --fail --silent --show-error \
              'https://ghcr.io/token?scope=repository:mss-boot-ai%2Fs3-copy-gateway:pull&service=ghcr.io' \
              | jq -er '.token'
          )"
          curl --fail --silent --show-error --head \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/mss-boot-ai/s3-copy-gateway/manifests/v0.1.0"
