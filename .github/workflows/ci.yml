name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.x
          check-latest: true
          cache: true

      - name: Scan known vulnerabilities
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          repo-checkout: false
          go-version-input: 1.25.x
          check-latest: true
          go-package: ./...

      - name: Run checks
        run: make ci

  container:
    name: Container build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          push: false
          tags: s3-copy-gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          container_name=s3-copy-gateway-ci
          trap 'docker rm --force "$container_name" >/dev/null 2>&1 || true' EXIT

          docker run --detach \
            --name "$container_name" \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --env-file config/example.env \
            --publish 127.0.0.1:18080:8080 \
            s3-copy-gateway:ci

          test "$(docker inspect --format '{{.Config.User}}' "$container_name")" = "65532:65532"

          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://127.0.0.1:18080/healthz; then
              exit 0
            fi
            sleep 0.5
          done

          docker logs "$container_name"
          exit 1
